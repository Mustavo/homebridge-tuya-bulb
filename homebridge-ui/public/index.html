<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tuya Bulb Setup</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; }
    .panel { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 13px; }
    input, select { width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; margin-bottom: 12px; box-sizing: border-box; }
    button { background: #0d6efd; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.danger { background: #dc3545; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #dee2e6; padding: 6px 10px; text-align: left; }
    th { background: #e9ecef; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-online { background: #d1e7dd; color: #0f5132; }
    .badge-offline { background: #f8d7da; color: #842029; }
    h3 { margin-top: 0; }
    #groupForm { margin-top: 12px; background: #fff; border: 1px solid #dee2e6; border-radius: 4px; padding: 12px; }
    #groupMembers label { font-weight: 400; }
    .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d; margin-bottom: 8px; }
  </style>
</head>
<body>
<div id="bootstrap-panel" class="panel" style="display:none">
  <h3>Initial Setup — Fetch Device Keys</h3>
  <p style="font-size:13px;color:#555">Enter your Tuya IoT Platform credentials once. Keys are saved locally — no ongoing cloud access needed.</p>
  <label>Client ID</label>
  <input type="text" id="clientId" placeholder="e.g. abcdef1234567890abcd" />
  <label>Client Secret</label>
  <input type="password" id="clientSecret" placeholder="Your secret key" />
  <label>Region</label>
  <select id="region">
    <option value="auto">Auto-detect (EU → US → CN → IN)</option>
    <option value="eu">EU (openapi.tuyaeu.com)</option>
    <option value="us">US (openapi.tuyaus.com)</option>
    <option value="cn">CN (openapi.tuya.com)</option>
    <option value="in">IN (openapi.tuyain.com)</option>
  </select>
  <button id="fetchBtn" onclick="fetchDevices()">Fetch Devices</button>
  <div id="fetchStatus" style="margin-top:10px;font-size:13px"></div>
</div>

<div id="management-panel" class="panel" style="display:none">
  <h3>Devices</h3>
  <table id="deviceTable">
    <thead><tr><th>Name</th><th>Device ID</th><th>MAC</th><th>Status</th></tr></thead>
    <tbody></tbody>
  </table>
  <div style="margin-top:10px">
    <button class="danger" onclick="showBootstrap()">Re-fetch Keys</button>
  </div>

  <h3 style="margin-top:20px">Groups</h3>
  <p style="font-size:13px;color:#555">Group multiple bulbs into a single HomeKit device (for multi-bulb fittings).</p>
  <div id="groupsList"></div>
  <button onclick="showGroupForm()">+ New Group</button>

  <div id="groupForm" style="display:none">
    <div class="section-label">New Group</div>
    <label>Group Name</label>
    <input type="text" id="groupName" placeholder="Living Room Pendant" />
    <label>Primary Device (drives state in HomeKit)</label>
    <select id="primaryDevice"></select>
    <label>Members (select all bulbs in this group)</label>
    <div id="groupMembers"></div>
    <label style="margin-top:8px">
      <input type="checkbox" id="exposeIndividual" />
      &nbsp;Also expose individual bulbs as separate HomeKit accessories
    </label>
    <div style="margin-top:10px">
      <button onclick="addGroup()">Add Group</button>
      &nbsp;
      <button onclick="hideGroupForm()" style="background:#6c757d">Cancel</button>
    </div>
  </div>

  <div style="margin-top:16px">
    <button onclick="saveDevices()">Save Configuration</button>
  </div>
</div>

<script>
let devices = [];
let groups = [];

function esc(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function init() {
  const resp = await homebridge.request('/get-devices');
  devices = resp.devices || [];
  groups = resp.groups || [];
  if (devices.length === 0) {
    showBootstrap();
  } else {
    showManagement();
  }
}

function showBootstrap() {
  document.getElementById('bootstrap-panel').style.display = 'block';
  document.getElementById('management-panel').style.display = 'none';
}

function showManagement() {
  document.getElementById('bootstrap-panel').style.display = 'none';
  document.getElementById('management-panel').style.display = 'block';
  renderDeviceTable();
  renderGroups();
}

function renderDeviceTable() {
  const tbody = document.querySelector('#deviceTable tbody');
  tbody.innerHTML = devices.map(d => `
    <tr>
      <td>${esc(d.name)}</td>
      <td style="font-family:monospace;font-size:11px">${esc(d.id)}</td>
      <td style="font-family:monospace;font-size:11px">${esc(d.mac) || '—'}</td>
      <td><span class="badge ${d.online ? 'badge-online' : 'badge-offline'}">${d.online ? 'Online' : 'Offline'}</span></td>
    </tr>
  `).join('');
}

function renderGroups() {
  const el = document.getElementById('groupsList');
  if (groups.length === 0) { el.innerHTML = '<p style="font-size:13px;color:#6c757d">No groups configured.</p>'; return; }
  el.innerHTML = groups.map((g, i) => `
    <div style="border:1px solid #dee2e6;border-radius:4px;padding:10px;margin-bottom:8px;background:#fff">
      <strong>${esc(g.name)}</strong> — ${g.members.length} bulbs
      <span style="font-size:12px;color:#6c757d"> (primary: ${deviceName(g.primary)})</span>
      <br><span style="font-size:12px">${g.exposeIndividual ? 'Also showing individual bulbs' : 'Group only'}</span>
      <button onclick="removeGroup(${i})" style="background:#dc3545;padding:2px 8px;font-size:12px;float:right">Remove</button>
    </div>
  `).join('');
}

function deviceName(id) {
  const d = devices.find(x => x.id === id);
  return d ? esc(d.name) : esc(id);
}

function showGroupForm() {
  const primarySel = document.getElementById('primaryDevice');
  primarySel.innerHTML = devices.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
  const membersDiv = document.getElementById('groupMembers');
  membersDiv.innerHTML = devices.map(d => `
    <label><input type="checkbox" class="member-check" value="${d.id}" /> ${d.name}</label><br>
  `).join('');
  document.getElementById('groupForm').style.display = 'block';
}

function hideGroupForm() {
  document.getElementById('groupForm').style.display = 'none';
  document.getElementById('groupName').value = '';
}

function addGroup() {
  const name = document.getElementById('groupName').value.trim();
  if (!name) { homebridge.toast.error('Group name is required'); return; }
  const primary = document.getElementById('primaryDevice').value;
  const members = [...document.querySelectorAll('.member-check:checked')].map(c => c.value);
  if (members.length < 2) { homebridge.toast.error('Select at least 2 members'); return; }
  const exposeIndividual = document.getElementById('exposeIndividual').checked;
  groups.push({ name, primary, members, exposeIndividual });
  hideGroupForm();
  renderGroups();
}

function removeGroup(i) {
  groups.splice(i, 1);
  renderGroups();
}

async function fetchDevices() {
  if (groups.length > 0) {
    if (!confirm('Re-fetching will clear your current group configuration. Continue?')) return;
  }
  const btn = document.getElementById('fetchBtn');
  const status = document.getElementById('fetchStatus');
  btn.disabled = true;
  status.textContent = 'Fetching...';
  try {
    const resp = await homebridge.request('/fetch-devices', {
      clientId: document.getElementById('clientId').value.trim(),
      clientSecret: document.getElementById('clientSecret').value.trim(),
      region: document.getElementById('region').value,
    });
    if (!resp.success) throw new Error(resp.error || 'Unknown error');
    devices = resp.devices;
    groups = [];
    status.textContent = '';
    homebridge.toast.success(`Fetched ${resp.count} devices. Restart Homebridge to activate.`);
    showManagement();
  } catch (e) {
    status.textContent = `Error: ${e.message}`;
    homebridge.toast.error(e.message);
  } finally {
    btn.disabled = false;
  }
}

async function saveDevices() {
  try {
    await homebridge.request('/save-devices', { devices, groups });
    homebridge.toast.success('Configuration saved. Restart Homebridge to apply.');
  } catch (e) {
    homebridge.toast.error(e.message);
  }
}

init();
</script>
</body>
</html>
